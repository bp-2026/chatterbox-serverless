name: Build and push Chatterbox image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: 0.1.0)"
        required: false
        default: "0.1.0"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: meta
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then tag="0.1.0"; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/chatterbox-serverless:$tag" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository_owner }}/chatterbox-serverless:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/chatterbox-serverless:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/chatterbox-serverless:buildcache,mode=max

      - name: Summary
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
